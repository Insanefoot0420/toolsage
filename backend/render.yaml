# ToolSage Backend - Render.com deployment config
# 1. Push kod na GitHub
# 2. Na https://render.com klikni "New +" → "Web Service"
# 3. Connect GitHub repo
# 4. Render自动detekne tento soubor
# 5. Add Environment Variables (SUPABASE_URL, SUPABASE_ANON_KEY)
# 6. Deploy!

services:
  - type: web
    name: toolsage-backend
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: PORT
        value: 3001
